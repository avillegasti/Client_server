events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        # Frontend static files
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Telemetry API
        location /api/telemetry {
            rewrite ^/api/telemetry/(.*) /$1 break;
            proxy_pass http://telemetry-api:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Image API
        location /api/images {
            rewrite ^/api/images/(.*) /$1 break;
            proxy_pass http://image-api:8002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Backward compatibility for common endpoints if needed
        location /devices {
            proxy_pass http://telemetry-api:8001/devices;
        }
        
        location /telemetry {
            proxy_pass http://telemetry-api:8001/telemetry;
        }
        
        location /images {
            proxy_pass http://image-api:8002/images;
        }
    }
}
